name: Update VeloTV EPG

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so we can reset it

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml lxml

      - name: Clear Stuck Large Commits
        run: |
          git config --global user.name "VeloTV-Bot"
          git config --global user.email "bot@velotv.app"
          # Sync local state with remote and wipe any pending heavy commits
          git reset --hard origin/main

      - name: Run EPG Optimizer
        run: python xmlmerge.py

      - name: Verify File Size
        run: |
          ls -lh epg.xml.gz
          FILE_SIZE=$(stat -c%s "epg.xml.gz")
          MAX_SIZE=100000000 # 100MB
          if [ $FILE_SIZE -gt $MAX_SIZE ]; then
            echo "Error: epg.xml.gz is still over 100MB ($FILE_SIZE bytes)"
            exit 1
          fi

      - name: Commit and Force Push
        run: |
          git add epg.xml.gz
          git commit -m "Update EPG Data (Pruned & Optimized)" || echo "No changes"
          # Use force to overwrite the 184MB error on the remote server
          git push origin main --force

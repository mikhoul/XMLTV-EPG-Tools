name: VeloTV EPG Generator
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Fixed: Support for Node 24

      - name: Set up Python
        uses: actions/setup-python@v6 # Fixed: Support for Node 24
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install lxml requests pyyaml

      - name: Run XMLTV Merge
        run: |
          # This Python snippet forces your simple list into the tool's required format
          python -c "
          import yaml, subprocess, os
          with open('xmlmerge.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          # Convert your list of strings into the dictionary format the tool expects
          formatted_files = [{'url': u, 'name': f'src_{i}'} for i, u in enumerate(data['files'])]
          
          # Write a temporary config the tool can understand
          with open('temp_config.yaml', 'w') as f:
              yaml.dump({'files': formatted_files, 'output': 'epg.xml', 'gzip': True}, f)
          
          # Execute the tool using the temporary config
          subprocess.run(['python', 'xmlmerge.py', '-c', 'temp_config.yaml'])
          "

      - name: Commit and Push
        run: |
          git config --global user.name "VeloTV-Bot"
          git config --global user.email "bot@velotv.app"
          # The tool outputs to 'output/merged.xml.gz' by default
          cp output/merged.xml.gz epg.xml.gz 
          git add epg.xml.gz
          git commit -m "Update EPG data (Node 24 Ready)" || echo "No changes"
          git push

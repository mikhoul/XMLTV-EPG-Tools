name: Update VeloTV EPG

on:
  schedule:
    # Runs twice daily for global freshness (2 AM & 2 PM UTC)
    - cron: '0 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pyyaml lxml

      - name: Sync with Remote
        run: |
          git config --global user.name "VeloTV-Bot"
          git config --global user.email "bot@velotv.app"
          # Ensure we have the latest files from the repo before running the script
          git fetch origin main
          git reset --hard origin/main

      - name: Run EPG Daily Splitter
        run: python xmlmerge.py

      - name: Clean Up Old Files
        run: |
          # Optional: Remove files older than 3 days to keep the repo clean
          find . -name "*.xml.gz" -mtime +3 -delete

      - name: Commit and Force Push
        run: |
          # Stage refreshed and removed daily files
          git add -A -- '*.xml.gz'
          git commit -m "Update Daily EPG Partitioned Files" || echo "No changes"
          
          # Force push to ensure the partitioned strategy overwrites any old single-file history
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force

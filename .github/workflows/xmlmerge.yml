    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # THIS IS THE MISSING PIECE
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run Direct Merge
        run: |
          python -c "
          import requests, gzip, io, os
          # ... (rest of the script remains exactly the same)
          "
          gzip -9 -c epg.xml > epg.xml.gz
          ls -lh epg.xml.gz

      - name: Commit and Push
        run: |
          git config --global user.name "VeloTV-Bot"
          git config --global user.email "bot@velotv.app"
          git add epg.xml.gz
          git commit -m "Update EPG - Installed missing dependencies" || echo "No changes"
          git push
